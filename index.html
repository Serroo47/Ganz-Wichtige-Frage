<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penguin Valentine 💙</title>
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <main class="bg">
      <section class="card" id="card">
        <header class="top">
          <div class="brand">❄️ to: Kübi</div>
          <div class="tag" id="tag">from: Serhat</div>
        </header>

        <!-- CONTENT AREA: wird später bei YES komplett ersetzt -->
        <div id="content">
          <img class="hero" src="/penguin.gif" alt="Penguin" />

          <h1 class="title">Möchtest du mit mir zusammen sein?</h1>
          <p class="subtitle">Du hast übrigens keine andere Wahl außer Ja zu sagen.</p>

          <div class="actions" id="actions">
            <button id="yesBtn" class="btn yes">JA! 🐧💙</button>
            <button id="noBtn" class="btn no">Nein…</button>
          </div>

          <p id="line" class="line">Klick ruhig auf „Nein…" wenn du dich traust.</p>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
